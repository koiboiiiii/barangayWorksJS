<!DOCTYPE html>
<html>
<head>
  	<meta charset="utf-8">
  	<meta name="viewport" content="initial-scale=1, width=device-width">
  	
  	<link rel="stylesheet"  href="./adminlogin.css" />
  	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas Neue:wght@400&display=swap" />
  	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cal Sans:wght@400&display=swap" />
  	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&display=swap" />
  	
  	
  	
</head>
<body>
  	
  	<div class="adminlogin">
    		<div class="rectangle-parent">
      			<div class="frame-child">
      			</div>
      			<div class="barangay-appointment-schedulin-container">
        				<span>Barangay Appointment scheduling<br></span>
        				<span class="admin-access">Admin access</span>
      			</div>
      			<img class="image-1-icon" src="./assets/image1.png" alt="">
      			
      			<img class="image-2-icon" src="./assets/image2.png" alt="">
      			
      			<div class="rectangle-group">
        				<div class="group-child">
        				</div>
        				<div class="all-rights-reserved">All Rights Reserved 2026.</div>
      			</div>
    		</div>
    		<div class="rectangle-container">
      			<div class="frame-item">
      			</div>
      			<div class="enter-admin-login">enter admin login</div>
      			<div class="btnlogin">
        				<div class="login">Login</div>
      			</div>
      			<div class="text-field">
        				<div class="text-field2">
          					<div class="state-layer">
            						<div class="content">
              							<div class="label-text-container">
                								<div class="label-text">Username</div>
              							</div>
									<input class="tfusername" type="text" autocomplete="username" aria-label="Username">
            						</div>
									<button class="eraseusername" type="button" aria-label="Clear username">
										<img src="./assets/cancel.svg" alt="">
									</button>
          					</div>
        				</div>
        				<div class="active-indicator">
        				</div>
        				<div class="supporting-text">
        				</div>
      			</div>
      			<div class="text-field3">
        				<div class="text-field2">
          					<div class="state-layer">
            						<div class="content">
              							<div class="label-text-container">
                								<div class="label-text">Password</div>
              							</div>
									<input class="tfpassword" type="password" autocomplete="current-password" aria-label="Password">
            						</div>
									<button class="erasepassword" type="button" aria-label="Clear password">
										<img src="./assets/cancel.svg" alt="">
									</button>
          					</div>
        				</div>
        				<div class="active-indicator">
        				</div>
        				<div class="supporting-text1">
        				</div>
      			</div>
    		</div>
  	</div>

	<script src="./main.js?v=2"></script>
  	
</body>
</html>
