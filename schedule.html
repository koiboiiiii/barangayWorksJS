<!DOCTYPE html>
<html>
<head>
  	<meta charset="utf-8">
  	<meta name="viewport" content="initial-scale=1, width=device-width">
  	
  	<link rel="stylesheet"  href="./schedule.css" />
  	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas Neue:wght@400&display=swap" />
  	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cal Sans:wght@400&display=swap" />
  	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap" />
  	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400&display=swap" />
  	
  	
  	
</head>
<body>
  	
  	<div class="schedules">
    		<div class="rectangle-parent">
      			<div class="frame-child">
      			</div>
      			<div class="manage-schedules">Manage Schedules</div>
    		</div>
    		<div class="rectangle-group">
      			<div class="frame-item">
      			</div>
      			<div class="btnapply">
        				<div class="apply">Apply</div>
      			</div>
      			<div class="btnback">
        				<div class="apply">Back</div>
      			</div>
      			<div class="btnmark">
        				<div class="apply">Mark as<br>Unavailable</div>
      			</div>
				<div class="calendar">
					<div class="block">
						<div class="icon-button">
							<img class="chevron-left-icon" src="./assets/chevronleft.svg" alt="">
						</div>
						<div class="calendar-select-group">
							<div class="calendar-month-field">
								<div class="select">
									<div class="september">Sep</div>
									<img class="chevron-down-icon" src="./assets/chevrondown.svg" alt="">
								</div>
							</div>
							<div class="calendar-year-field">
								<div class="select">
									<div class="september">2025</div>
									<img class="chevron-down-icon" src="./assets/chevrondown.svg" alt="">
								</div>
							</div>
						</div>
						<div class="icon-button">
							<img class="chevron-right-icon" src="./assets/chevronright.svg" alt="">
						</div>
					</div>
					<div class="table">
						<div class="thead">
							<div class="td"><div class="day-picker">Su</div></div>
							<div class="td"><div class="day-picker">Mo</div></div>
							<div class="td"><div class="day-picker">Tu</div></div>
							<div class="td"><div class="day-picker">We</div></div>
							<div class="td"><div class="day-picker">Th</div></div>
							<div class="td"><div class="day-picker">Fr</div></div>
							<div class="td"><div class="day-picker">Sa</div></div>
						</div>
						<div class="tbody">
							<div class="row">
								<div class="calendar-button"></div>
								<div class="calendar-button"><div class="day-picker8">1</div></div>
								<div class="calendar-button"><div class="day-picker8">2</div></div>
								<div class="calendar-button"><div class="day-picker8">3</div></div>
								<div class="calendar-button"><div class="day-picker8">4</div></div>
								<div class="calendar-button"><div class="day-picker8">5</div></div>
								<div class="calendar-button"><div class="day-picker8">6</div></div>
							</div>
							<div class="row2">
								<div class="calendar-button8"><div class="day-picker8">7</div></div>
								<div class="calendar-button8"><div class="day-picker8">8</div></div>
								<div class="calendar-button10"><div class="day-picker8">9</div></div>
								<div class="calendar-button11"><div class="day-picker17">10</div></div>
								<div class="calendar-button11"><div class="day-picker8">11</div></div>
								<div class="calendar-button11"><div class="day-picker8">12</div></div>
								<div class="calendar-button10"><div class="day-picker8">13</div></div>
							</div>
							<div class="row3">
								<div class="calendar-button"><div class="day-picker8">14</div></div>
								<div class="calendar-button"><div class="day-picker8">15</div></div>
								<div class="calendar-button"><div class="day-picker8">16</div></div>
								<div class="calendar-button"><div class="day-picker8">17</div></div>
								<div class="calendar-button"><div class="day-picker8">18</div></div>
								<div class="calendar-button"><div class="day-picker8">19</div></div>
								<div class="calendar-button"><div class="day-picker8">20</div></div>
							</div>
							<div class="row4">
								<div class="calendar-button"><div class="day-picker8">21</div></div>
								<div class="calendar-button"><div class="day-picker8">22</div></div>
								<div class="calendar-button"><div class="day-picker8">23</div></div>
								<div class="calendar-button"><div class="day-picker8">24</div></div>
								<div class="calendar-button"><div class="day-picker8">25</div></div>
								<div class="calendar-button"><div class="day-picker8">26</div></div>
								<div class="calendar-button"><div class="day-picker8">27</div></div>
							</div>
							<div class="row5">
								<div class="calendar-button8"><div class="day-picker8">28</div></div>
								<div class="calendar-button8"><div class="day-picker8">29</div></div>
								<div class="calendar-button8"><div class="day-picker8">30</div></div>
								<div class="calendar-button"><div class="day-picker8">1</div></div>
								<div class="calendar-button"><div class="day-picker8">2</div></div>
								<div class="calendar-button"><div class="day-picker8">3</div></div>
								<div class="calendar-button"><div class="day-picker8">4</div></div>
							</div>
						</div>
					</div>
      			</div>
      			<div class="dateunavailable">Date unavailable, please select other date.</div>
    		</div>
  	</div>
		<script src="/api/bw-config.js"></script>
	   <script src="./main.js?v=20260528-schedule"></script>
  	
  	
  	
</body>
</html>
